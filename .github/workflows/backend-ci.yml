name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  lint-and-type-check:
    name: Lint & type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Ruff lint
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

      - name: Mypy type check
        run: poetry run mypy app

      - name: Bandit security scan
        run: poetry run bandit -r app

  test:
    name: Tests
    # ubuntu-latest has Docker pre-installed; Testcontainers uses it for the
    # Postgres container that backs the integration tier (ADR 0007).
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      # Testcontainers manages its own Postgres container; this value is only
      # used by Settings() at import time and is never connected to in tests.
      DATABASE_URL: postgresql+asyncpg://ci:ci@localhost/ci_placeholder
      CLERK_JWKS_URL: https://example.clerk.accounts.dev/.well-known/jwks.json
      MUSICBRAINZ_USER_AGENT: "Harmoniq/0.1.0 (ci@harmoniq.test)"
      APP_ENV: test
      DEBUG: "false"
      # Allow Testcontainers to detect the Docker host automatically.
      TESTCONTAINERS_RYUK_DISABLED: "false"

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests (unit + integration)
        run: poetry run pytest --cov=app --cov-report=xml -q

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: backend/coverage.xml
          flags: backend
        continue-on-error: true
